<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fraud Detection</title>
    <style>
        body {
            font-family: Arial;
            background: #2f4f8f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #3e5c94;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            color: white;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
        }

        button {
            background: linear-gradient(to right, #00c6ff, #0072ff);
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>💳 Fraud Detection</h2>

    <input id="userId" placeholder="User ID">
    <input id="amount" placeholder="Transaction Amount" type="number">
    <input id="location" placeholder="Location">

    <!-- IMPORTANT: type="button" -->
    <button type="button" onclick="checkFraud()">Check Transaction</button>

    <p id="result"></p>
</div>

<script>
    async function checkFraud() {

        const userId = document.getElementById("userId").value;
        const amount = document.getElementById("amount").value;
        const location = document.getElementById("location").value;

        try {
            const response = await fetch('/check', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    userId: userId,
                    amount: amount,
                    location: location
                })
            });

            const data = await response.json();

            document.getElementById("result").innerText =
                data.fraud ? "⚠️ Fraud Detected!" : "✅ Safe Transaction";

        } catch (error) {
            console.error(error);
            document.getElementById("result").innerText = "❌ Error connecting to server";
        }
    }
</script>

</body>
</html>
