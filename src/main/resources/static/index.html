<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fraud Detection System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            width: 380px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #00c6ff;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: 500;
        }

        .fraud {
            color: #ff4d4d;
        }

        .safe {
            color: #00ffcc;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>💳 Fraud Detection</h1>

    <input type="text" id="userId" placeholder="User ID">
    <input type="number" id="amount" placeholder="Transaction Amount">
    <input type="text" id="location" placeholder="Location">

    <button onclick="checkFraud()">Check Transaction</button>

    <div id="result" class="result"></div>
</div>

<script>
    async function checkFraud() {
        const userId = document.getElementById("userId").value;
        const amount = document.getElementById("amount").value;
        const location = document.getElementById("location").value;

        const response = await fetch("http://localhost:8080/api/fraud/check", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                userId: userId,
                amount: amount,
                location: location
            })
        });

        const result = await response.json();

        const resultDiv = document.getElementById("result");

        if (result.fraud) {
            resultDiv.innerHTML = "⚠️ Fraud Detected!";
            resultDiv.className = "result fraud";
        } else {
            resultDiv.innerHTML = "✅ Safe Transaction";
            resultDiv.className = "result safe";
        }
    }
</script>

</body>
</html>
